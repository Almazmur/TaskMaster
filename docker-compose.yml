version: '3.8'

services:
  db:
    image: postgres:12-bullseye
    container_name: postgresql
    environment:
      POSTGRES_USER: skillbox
      POSTGRES_PASSWORD: skillbox
      POSTGRES_DB: skillbox
    ports:
      - "5432:5432"
    networks:
      - taskmanagement-network

  app:
    build: .
    container_name: task-management-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/task_management
      SPRING_DATASOURCE_USERNAME: skillbox
      SPRING_DATASOURCE_PASSWORD: skillbox
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET_KEY: mySecretKey
      JWT_EXPIRATION_MS: 3600000
    networks:
      - taskmanagement-network

networks:
  taskmanagement-network:
    driver: bridge